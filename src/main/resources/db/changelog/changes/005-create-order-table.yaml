databaseChangeLog:
  - changeSet:
      id: 005-create-Order-table
      author: shad
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true

              - column:
                  name: customer_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: restaurant_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: delivery_address_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: items_subtotal
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: delivery_fee
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: service_fee
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: tax
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: total
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: datetime2
                  constraints:
                    nullable: false

              - column:
                  name: accepted_at
                  type: datetime2

              - column:
                  name: ready_at
                  type: datetime2

              - column:
                  name: picked_up_at
                  type: datetime2

              - column:
                  name: delivered_at
                  type: datetime2

              - column:
                  name: cancelled_at
                  type: datetime2

              - column:
                  name: payment_status
                  type: varchar(50)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: Orders
            baseColumnNames: customer_id
            referencedTableName: Users
            referencedColumnNames: id
            constraintName: fk_Orders_customer

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: restaurant_id
            referencedTableName: restaurant
            referencedColumnNames: id
            constraintName: fk_Orders_restaurant

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: delivery_address_id
            referencedTableName: customer_address
            referencedColumnNames: id
            constraintName: fk_Orders_delivery_address

        - createIndex:
            tableName: orders
            indexName: idx_Orders_customer
            columns:
              - column:
                  name: customer_id

        - createIndex:
            tableName: orders
            indexName: idx_Orders_restaurant
            columns:
                - column:
                    name: restaurant_id