databaseChangeLog:
  - changeSet:
      id: 007-create-driver-table
      author: shad
      changes:
        - createTable:
            tableName: driver
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true

              - column:
                  name: user_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: vehicle_type
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: is_online
                  type: bit
                  constraints:
                    nullable: false

              - column:
                  name: lat
                  type: decimal(9,6)

              - column:
                  name: lng
                  type: decimal(9,6)

              - column:
                  name: last_location_at
                  type: datetime2

              - column:
                  name: avg_rating
                  type: decimal(10,2)

        - addForeignKeyConstraint:
            baseTableName: driver
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_driver_user
        - createIndex:
            tableName: driver
            indexName: idx_driver_user
            columns:
              - column:
                  name: user_id

