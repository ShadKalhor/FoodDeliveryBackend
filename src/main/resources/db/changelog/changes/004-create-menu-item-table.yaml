databaseChangeLog:
  - changeSet:
      id: 004-create-menu-item-table
      author: shad
      changes:
        createTable:
          tableName: MenuItem
          columns:
            - column:
                name: id
                type: uniqueIdentifier
                constraints:
                  nullable: false
                  primaryKey: true
            - column:
                name: restaurantId
                type: uniqueIdentifier
                constraints:
                  nullable: false
            - column:
                name: name
                type: varchar(255)
                constraints:
                  nullable: false
            - column:
                name: description
                type: varchar(500)
            - column:
                name: price
                type: decimal(10,2)
                constraints:
                  nullable: false
            - column:
                name: isAvailable
                type: bit
            - column:
                name: category
                type: varchar(255)
                constraints:
                  nullable: false
            - column:
                name: imageUrl
                type: varchar(255)
            - column:
                name: createdAt
                type: datetime2
                constraints:
                  nullable: false


            - addForeignKeyConstraint:
                baseTableName: MenuItem
                baseColumnNames: restaurantId
                referencedTableName: Restaurant
                referencedColumnNames: id
                constraintName: fk_menu_item_restaurant