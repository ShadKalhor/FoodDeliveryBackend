databaseChangeLog:
  - changeSet:
      id: 004-create-menu-item-table
      author: shad
      changes:
        createTable:
          tableName: menu_item
          columns:
            - column:
                name: id
                type: uniqueidentifier
                constraints:
                  nullable: false
                  primaryKey: true
            - column:
                name: restaurant_id
                type: uniqueidentifier
                constraints:
                  nullable: false
            - column:
                name: name
                type: varchar(255)
                constraints:
                  nullable: false
            - column:
                name: description
                type: varchar(500)
            - column:
                name: price
                type: decimal(10,2)
                constraints:
                  nullable: false
            - column:
                name: is_available
                type: bit
            - column:
                name: category
                type: varchar(255)
                constraints:
                  nullable: false
            - column:
                name: image_url
                type: varchar(255)
            - column:
                name: created_at
                type: datetime2
                constraints:
                  nullable: false


            - addForeignKeyConstraint:
                baseTableName: menu_item
                baseColumnNames: restaurant_id
                referencedTableName: restaurant
                referencedColumnNames: id
                constraintName: fk_menu_item_restaurant