databaseChangeLog:
  - changeSet:
      id: 002-create-restaurant-table.yaml
      author: shad
      changes:
        - createTable:
            tableName: restaurant
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: owner_user_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: varchar(500)
              - column:
                  name: lat
                  type: decimal(9,6)
              - column:
                  name: lng
                  type: decimal(9,6)
              - column:
                  name: open_time
                  type: time
              - column:
                  name: close_time
                  type: time
              - column:
                  name: is_open
                  type: bit
              - column:
                  name: min_order_amount
                  type: decimal(10,2)
              - column:
                  name: avg_prep_time_in_mins
                  type: int
              - column:
                  name: created_at
                  type: datetime2
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: restaurant
            baseColumnNames: owner_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_restaurant_owner_user