databaseChangeLog:
  - changeSet:
      id: create-customer-address-table
      author: shad
      changes:
        - createTable:
            tableName: customer_address
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: user_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: varchar(100)
              - column:
                  name: address
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: lat
                  type: decimal(9,6)

              - column:
                  name: lng
                  type: decimal(9,6)

        - addForeignKeyConstraint:
            baseTableName: customer_address
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_customer_address_user