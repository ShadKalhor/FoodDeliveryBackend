databaseChangeLog:
  - changeSet:
      id: 008-create-delivery-table
      author: shad
      changes:
        - createTable:
            tableName: delivery
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: order_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: driver_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: pickup_lat
                  type: decimal(9,6)

              - column:
                  name: pickup_lng
                  type: decimal(9,6)

              - column:
                  name: dropoff_lat
                  type: decimal(9,6)

              - column:
                  name: dropoff_lng
                  type: decimal(9,6)

              - column:
                  name: assigned_at
                  type: datetime2

              - column:
                  name: accepted_at
                  type: datetime2

              - column:
                  name: picked_up_at
                  type: datetime2

              - column:
                  name: delivered_at
                  type: datetime2
        - addForeignKeyConstraint:
            baseTableName: delivery
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_delivery_order

        - addForeignKeyConstraint:
            baseTableName: delivery
            baseColumnNames: driver_id
            referencedTableName: driver
            referencedColumnNames: id
            constraintName: fk_delivery_driver

        - createIndex:
            tableName: delivery
            indexName: idx_delivery_driver
            columns:
              - column:
                  name: driver_id