databaseChangeLog:
  - changeSet:
      id: 006-create-order-item-table
      author: shad
      changes:
        - createTable:
            tableName: order_item
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true

              - column:
                  name: order_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: menu_item_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false

              - column:
                  name: name_snapshot
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: unit_price_snapshot
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false

              - column:
                  name: line_total
                  type: decimal(10,2)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: order_item
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_order_item_order

        - addForeignKeyConstraint:
            baseTableName: order_item
            baseColumnNames: menu_item_id
            referencedTableName: menu_item
            referencedColumnNames: id
            constraintName: fk_order_item_menu_item

        - createIndex:
            tableName: order_item
            indexName: idx_order_item_order
            columns:
              - column:
                  name: order_id

        - createIndex:
            tableName: order_item
            indexName: idx_order_item_menu_item
            columns:
              - column:
                  name: menu_item_id
